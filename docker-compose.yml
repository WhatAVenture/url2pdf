version: '3.8'

services:
  browserless:
    build: .
    container_name: browserless
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - TOKEN=${BROWSERLESS_TOKEN}
      - TIMEOUT=60000
      - CONCURRENT=5
    restart: unless-stopped

  ghostscript:
    image: alpine:latest
    container_name: ghostscript
    ports:
      - "3001:3001"
    command: >
      sh -c "apk add --no-cache ghostscript nodejs npm &&
             npm install -g express multer &&
             node /app/server.js"
    volumes:
      - ./gs-server.js:/app/server.js
    restart: unless-stopped
